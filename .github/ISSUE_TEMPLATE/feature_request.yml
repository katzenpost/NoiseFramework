name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What use case does it address?
      placeholder: I need to... but currently NoiseFramework doesn't support...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this feature to work
      placeholder: |
        Add a new method `handshake.rekey()` that...
        
        Example usage:
        ```python
        handshake.rekey()
        ```
    validations:
      required: true

  - type: dropdown
    id: feature-type
    attributes:
      label: Feature Type
      description: What type of feature is this?
      options:
        - New handshake pattern support
        - New cryptographic primitive
        - API enhancement
        - CLI enhancement
        - Performance improvement
        - Documentation improvement
        - Developer experience
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: I could work around this by... but it would be better if...

  - type: textarea
    id: noise-spec
    attributes:
      label: Noise Specification Reference
      description: If applicable, reference the relevant section of the Noise Protocol specification
      placeholder: "Section 7.3 of the Noise specification describes..."

  - type: dropdown
    id: breaking
    attributes:
      label: Breaking Change
      description: Would this feature require breaking changes to the API?
      options:
        - "No - fully backward compatible"
        - "Yes - requires API changes"
        - "Unknown"
    validations:
      required: true

  - type: dropdown
    id: willing-to-implement
    attributes:
      label: Implementation
      description: Are you willing to implement this feature?
      options:
        - "Yes, I can submit a PR"
        - "Yes, with guidance"
        - "No, but I can help test"
        - "No"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, examples, or references
      placeholder: Similar implementations in other libraries...

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and PRs to avoid duplicates
          required: true
        - label: This feature aligns with the Noise Protocol specification
          required: false
        - label: I have considered backward compatibility
          required: true
