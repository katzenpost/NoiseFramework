name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us resolve the issue.

  - type: checkboxes
    id: security
    attributes:
      label: Security Issue
      description: If this is a security vulnerability, please report it privately via our [Security Policy](../../docs/SECURITY.md) instead.
      options:
        - label: This is NOT a security vulnerability
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Create handshake with pattern '...'
        2. Call method '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Handshake should complete successfully
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages.
      placeholder: |
        ValueError: ...
        Traceback (most recent call last):
          ...
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal Code Example
      description: Provide a minimal code example that reproduces the issue
      render: python
      placeholder: |
        from noiseframework import NoiseHandshake
        
        handshake = NoiseHandshake("Noise_XX_25519_ChaChaPoly_SHA256")
        # ... code that triggers the bug
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: NoiseFramework Version
      description: Which version of NoiseFramework are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Which version of Python are you using?
      placeholder: "3.11.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Which OS are you running on?
      placeholder: "Windows 11, Ubuntu 22.04, macOS 14"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information about the problem
      placeholder: This only happens when...

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I am using the latest version of NoiseFramework
          required: false
        - label: I have included a minimal reproducible example
          required: true
